name: Build & Deploy (root)

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build:static
        env:
          NEXT_PUBLIC_API_URL: https://server-green-five-19.vercel.app

      - name: Sync build to root for GH Pages
        run: |
          rm -rf _next img 404 index.html index.txt 404.html
          cp -r undangan/index.html index.html
          cp -r undangan/index.txt index.txt
          cp -r undangan/404.html 404.html
          cp -r undangan/404 404
          cp -r undangan/_next _next
          cp -r undangan/img img
          cp undangan/CNAME CNAME 2>/dev/null || true

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: deploy static build to root [skip ci]'
          commit_options: '--no-verify'
          skip_dirty_check: false
